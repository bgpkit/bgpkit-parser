<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MRT Explorer — @bgpkit/parser</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #0a0e14; }
::-webkit-scrollbar-thumb { background: #2a3042; border-radius: 3px; }

.btn {
  background: transparent;
  border: 1px solid #2a3042;
  color: #7aa2f7;
  padding: 6px 14px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  letter-spacing: 0.05em;
  transition: all 0.15s;
  border-radius: 2px;
}
.btn:hover:not(:disabled) {
  border-color: #7aa2f7;
  background: rgba(122, 162, 247, 0.08);
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary {
  background: #7aa2f7;
  color: #0a0e14;
  border-color: #7aa2f7;
  font-weight: 600;
}
.btn-primary:hover:not(:disabled) {
  background: #9ab5ff;
  border-color: #9ab5ff;
}

input, select {
  background: #0d1117;
  border: 1px solid #2a3042;
  color: #c5cdd9;
  padding: 6px 10px;
  font-family: inherit;
  font-size: 12px;
  border-radius: 2px;
  outline: none;
  transition: border-color 0.15s;
}
input:focus, select:focus { border-color: #7aa2f7; }
select option { background: #0d1117; }

.th-btn {
  background: none;
  border: none;
  color: #506073;
  cursor: pointer;
  font-family: inherit;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 4px;
}
.th-btn:hover { color: #c5cdd9; }
.th-btn.active { color: #7aa2f7; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.3s ease forwards; }

.tr-announce:hover { background: rgba(115, 218, 148, 0.04) !important; }
.tr-withdraw:hover { background: rgba(247, 118, 142, 0.04) !important; }
</style>
</head>
<body>
<div id="root"></div>

<!--
  Load WASM in a real ES module (Babel won't touch this).
  Uses jsdelivr which serves raw npm files — esm.sh rewrites JS and breaks
  import.meta.url / WASM path resolution. We use the /web entry point which
  has async init() suitable for browsers.
-->
<script type="module">
(async () => {
  const VER = "0.15.2";
  const BASE = "https://cdn.jsdelivr.net/npm/@bgpkit/parser@" + VER;

  try {
    // Load the web entry point (has init() for async WASM loading)
    const mod = await import(BASE + "/web.mjs");

    // Explicitly pass the WASM URL so the module doesn't rely on import.meta.url
    await mod.init(BASE + "/web/bgpkit_parser_bg.wasm");

    // Wrap the generator into a batch function for the UI
    window.__bgpkit_wasm = {
      status: "ready",
      parseMrt: (data) => {
        const allElems = [];
        for (const { elems } of mod.parseMrtRecords(data)) allElems.push(...elems);
        return allElems;
      },
    };
  } catch (e) {
    console.error("WASM load failed:", e);
    window.__bgpkit_wasm = { status: "error", error: e.message };
  }
  window.dispatchEvent(new Event("bgpkit-wasm-loaded"));
})();
</script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const PRESETS = [
  { label: "RIPE RIS rrc00 — 2025-01-01 00:00", url: "https://data.ris.ripe.net/rrc00/2025.01/updates.20250101.0000.gz" },
  { label: "RIPE RIS rrc06 — 2025-06-01 00:00", url: "https://data.ris.ripe.net/rrc06/2025.06/updates.20250601.0000.gz" },
  { label: "RIPE RIS rrc21 — 2025-01-01 00:00", url: "https://data.ris.ripe.net/rrc21/2025.01/updates.20250101.0000.gz" },
];

function fmtTs(ts) {
  if (!ts) return "\u2014";
  return new Date(ts * 1000).toISOString().replace("T", " ").slice(0, 19);
}

function truncate(str, n) {
  if (!str) return "\u2014";
  return str.length > n ? str.slice(0, n) + "\u2026" : str;
}

function formatAsPath(ap) {
  if (!ap) return null;
  if (typeof ap === "string") return ap;
  if (!Array.isArray(ap)) return JSON.stringify(ap);
  return ap.map(seg => {
    if (typeof seg === "number") return String(seg);
    if (Array.isArray(seg)) return "{" + seg.join(",") + "}";
    if (seg && seg.values) {
      if (seg.ty === "AS_SET" || seg.ty === "AS_CONFED_SET") return "{" + seg.values.join(",") + "}";
      return seg.values.join(" ");
    }
    return String(seg);
  }).join(" ");
}

function formatCommunity(c) {
  if (typeof c === "string") return c;
  if (c == null) return "";
  if (c.Custom) return c.Custom[0] + ":" + c.Custom[1];
  if ("NoExport" in c || c === "NoExport") return "no-export";
  if ("NoAdvertise" in c || c === "NoAdvertise") return "no-advertise";
  if ("NoExportSubConfed" in c || c === "NoExportSubConfed") return "no-export-sub-confed";
  if ("global_admin" in c && "local_data" in c) return c.global_admin + ":" + c.local_data[0] + ":" + c.local_data[1];
  return JSON.stringify(c);
}

function formatCommunities(comms) {
  if (!comms) return null;
  if (!Array.isArray(comms)) return String(comms);
  return comms.map(formatCommunity).join(" ");
}

async function decompressGzip(bytes) {
  if (bytes[0] !== 0x1f || bytes[1] !== 0x8b) return bytes;
  const stream = new Response(bytes).body.pipeThrough(new DecompressionStream("gzip"));
  const buf = await new Response(stream).arrayBuffer();
  return new Uint8Array(buf);
}

function MrtExplorer() {
  const [wasmStatus, setWasmStatus] = useState("loading");
  const [wasmError, setWasmError] = useState("");
  const parseFn = useRef(null);

  const [url, setUrl] = useState(PRESETS[0].url);
  const [isDragging, setIsDragging] = useState(false);

  const [stage, setStage] = useState("");
  const [progress, setProgress] = useState(0);
  const [error, setError] = useState("");
  const [elems, setElems] = useState([]);
  const [stats, setStats] = useState(null);
  const [fileName, setFileName] = useState("");

  const [typeFilter, setTypeFilter] = useState("ALL");
  const [search, setSearch] = useState("");
  const [sortCol, setSortCol] = useState("timestamp");
  const [sortDir, setSortDir] = useState("asc");
  const [page, setPage] = useState(0);
  const PAGE_SIZE = 50;

  // Load WASM (loaded in a separate <script type="module"> to avoid Babel issues)
  useEffect(() => {
    function check() {
      const w = window.__bgpkit_wasm;
      if (!w) return;
      if (w.status === "ready") {
        parseFn.current = w.parseMrt;
        setWasmStatus("ready");
      } else {
        setWasmStatus("error");
        setWasmError(w.error);
      }
    }
    check();
    if (!window.__bgpkit_wasm) {
      window.addEventListener("bgpkit-wasm-loaded", check);
      return () => window.removeEventListener("bgpkit-wasm-loaded", check);
    }
  }, []);

  async function runParse(rawBytes, name) {
    setError("");
    setElems([]);
    setStats(null);
    setPage(0);
    setFileName(name);

    try {
      setStage("decompress");
      setProgress(20);
      const decompressed = await decompressGzip(rawBytes);

      setStage("parse");
      setProgress(50);
      const result = parseFn.current(decompressed);

      const data = Array.isArray(result) ? result
        : typeof result === "string" ? JSON.parse(result)
        : [];

      setProgress(100);
      setElems(data);
      setStage("done");

      const announces = data.filter(e => (e.type || e.elem_type) === "ANNOUNCE" || e.elem_type === "A").length;
      setStats({
        total: data.length,
        announces,
        withdraws: data.length - announces,
        peerAsns: new Set(data.map(e => e.peer_asn)).size,
        prefixes: new Set(data.map(e => e.prefix)).size,
      });
    } catch (e) {
      setError(e.message);
      setStage("");
    }
  }

  async function handleFetchUrl() {
    if (!parseFn.current) return;
    setStage("fetch");
    setProgress(0);
    try {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error("HTTP " + resp.status + " " + resp.statusText);
      setStage("download");
      setProgress(10);
      const raw = new Uint8Array(await resp.arrayBuffer());
      await runParse(raw, url.split("/").pop());
    } catch (e) {
      setError(e.message);
      setStage("");
    }
  }

  const handleDrop = useCallback(async (e) => {
    e.preventDefault();
    setIsDragging(false);
    const file = e.dataTransfer.files[0];
    if (!file || !parseFn.current) return;
    setStage("read");
    setProgress(5);
    const raw = new Uint8Array(await file.arrayBuffer());
    await runParse(raw, file.name);
  }, []);

  const handleFileInput = useCallback(async (e) => {
    const file = e.target.files[0];
    if (!file || !parseFn.current) return;
    setStage("read");
    setProgress(5);
    const raw = new Uint8Array(await file.arrayBuffer());
    await runParse(raw, file.name);
  }, []);

  const filtered = elems
    .filter(e => {
      const t = e.type || (e.elem_type === "W" ? "WITHDRAW" : "ANNOUNCE");
      if (typeFilter !== "ALL" && t !== typeFilter) return false;
      if (search) {
        const q = search.toLowerCase();
        const ap = formatAsPath(e.as_path) || "";
        return (e.prefix || "").toLowerCase().includes(q) ||
          String(e.peer_asn || "").includes(q) ||
          ap.toLowerCase().includes(q) ||
          (e.peer_ip || "").toLowerCase().includes(q);
      }
      return true;
    })
    .sort((a, b) => {
      let av = a[sortCol] ?? "";
      let bv = b[sortCol] ?? "";
      if (sortCol === "peer_asn") { av = +av; bv = +bv; }
      if (typeof av === "number") return sortDir === "asc" ? av - bv : bv - av;
      return sortDir === "asc" ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
    });

  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  const pageData = filtered.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);

  function toggleSort(col) {
    if (sortCol === col) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSortCol(col); setSortDir("asc"); }
    setPage(0);
  }

  const isLoading = ["fetch", "download", "read", "decompress", "parse"].includes(stage);

  return (
    <div style={{
      minHeight: "100vh",
      background: "#0a0e14",
      color: "#c5cdd9",
      fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace",
      fontSize: "13px",
    }}>
      {/* Header */}
      <div style={{
        borderBottom: "1px solid #1a2030",
        padding: "12px 20px",
        display: "flex",
        alignItems: "center",
        justifyContent: "space-between",
        position: "sticky",
        top: 0,
        zIndex: 100,
        background: "#0a0e14",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
          <span style={{ color: "#7aa2f7", fontWeight: 700, fontSize: "15px", letterSpacing: "0.02em" }}>
            MRT Explorer
          </span>
          <span style={{ color: "#2a3042", fontSize: "11px" }}>powered by</span>
          <a href="https://www.npmjs.com/package/@bgpkit/parser" target="_blank" rel="noopener" style={{
            background: "rgba(122, 162, 247, 0.1)",
            border: "1px solid rgba(122, 162, 247, 0.2)",
            color: "#7aa2f7",
            padding: "2px 8px",
            borderRadius: "2px",
            fontSize: "11px",
            letterSpacing: "0.04em",
            textDecoration: "none",
            transition: "all 0.15s",
          }} onMouseOver={(e) => { e.target.style.background = "rgba(122, 162, 247, 0.2)"; e.target.style.borderColor = "#7aa2f7"; }}
             onMouseOut={(e) => { e.target.style.background = "rgba(122, 162, 247, 0.1)"; e.target.style.borderColor = "rgba(122, 162, 247, 0.2)"; }}>@bgpkit/parser</a>
        </div>

        <div style={{ display: "flex", alignItems: "center", gap: "12px", fontSize: "11px" }}>
          <a href="https://bgpkit.com" target="_blank" rel="noopener" style={{ color: "#506073", textDecoration: "none", transition: "color 0.15s" }}
             onMouseOver={(e) => e.target.style.color = "#c5cdd9"} onMouseOut={(e) => e.target.style.color = "#506073"}>bgpkit.com</a>
          <a href="https://github.com/bgpkit" target="_blank" rel="noopener" style={{ color: "#506073", textDecoration: "none", transition: "color 0.15s" }}
             onMouseOver={(e) => e.target.style.color = "#c5cdd9"} onMouseOut={(e) => e.target.style.color = "#506073"}>GitHub</a>
          <span style={{ color: "#1a2030" }}>{"|"}</span>
          <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
          <span style={{
            width: 7, height: 7, borderRadius: "50%",
            background: wasmStatus === "ready" ? "#73da94" : wasmStatus === "error" ? "#f7768e" : "#e0af68",
            display: "inline-block",
            animation: wasmStatus === "loading" ? "pulse 1.2s ease infinite" : "none",
          }} />
          <span style={{ color: "#506073" }}>
            WASM {wasmStatus === "ready" ? "ready" : wasmStatus === "error" ? "error" : "loading\u2026"}
          </span>
          {wasmStatus === "error" && (
            <span style={{ color: "#f7768e", marginLeft: 4 }}>{truncate(wasmError, 60)}</span>
          )}
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 1400, margin: "0 auto", padding: "20px" }}>
        {/* Input Panel */}
        <div style={{ border: "1px solid #1a2030", borderRadius: "4px", overflow: "hidden", marginBottom: 20 }}>
          {/* Drop Zone */}
          <div
            onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
            onDragLeave={() => setIsDragging(false)}
            onDrop={handleDrop}
            style={{
              padding: "20px",
              borderBottom: "1px solid #1a2030",
              background: isDragging ? "rgba(122, 162, 247, 0.06)" : "transparent",
              borderTop: isDragging ? "2px solid #7aa2f7" : "2px solid transparent",
              transition: "all 0.15s",
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              gap: 8,
              cursor: "default",
            }}
          >
            <span style={{ color: "#506073", fontSize: "12px" }}>
              {isDragging ? "DROP MRT FILE HERE" : "DRAG & DROP .mrt / .gz / .bz2"}
            </span>
            <span style={{ color: "#2a3042", fontSize: "11px" }}>or</span>
            <label style={{
              cursor: "pointer", color: "#7aa2f7", fontSize: "11px",
              letterSpacing: "0.05em", textDecoration: "underline", textUnderlineOffset: "3px",
            }}>
              browse files
              <input type="file" style={{ display: "none" }} onChange={handleFileInput} />
            </label>
          </div>

          {/* URL Input */}
          <div style={{ padding: "14px 20px", display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
            <select value="" onChange={(e) => { if (e.target.value) setUrl(e.target.value); }} style={{ minWidth: 160 }}>
              <option value="">{"\u2014"} Presets {"\u2014"}</option>
              {PRESETS.map(p => <option key={p.url} value={p.url}>{p.label}</option>)}
            </select>

            <input
              type="text" value={url}
              onChange={(e) => setUrl(e.target.value)}
              placeholder="https://data.ris.ripe.net/\u2026/updates.*.gz"
              style={{ flex: 1, minWidth: 300 }}
              onKeyDown={(e) => e.key === "Enter" && !isLoading && wasmStatus === "ready" && handleFetchUrl()}
            />

            <button className="btn btn-primary" disabled={isLoading || wasmStatus !== "ready" || !url} onClick={handleFetchUrl}>
              {isLoading ? "PARSING\u2026" : "FETCH & PARSE"}
            </button>
          </div>

          {/* Progress */}
          {isLoading && (
            <div style={{ padding: "0 20px 14px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
                <span style={{ color: "#506073", fontSize: "11px", textTransform: "uppercase", letterSpacing: "0.06em" }}>
                  {stage === "fetch" || stage === "download" ? "\u2193 fetching"
                    : stage === "decompress" ? "\u27f3 decompressing"
                    : stage === "parse" ? "\u2699 parsing wasm"
                    : stage === "read" ? "\u2191 reading file" : "\u2026"}
                </span>
                <span style={{ color: "#7aa2f7", fontSize: "11px" }}>{progress}%</span>
              </div>
              <div style={{ height: 2, background: "#1a2030", borderRadius: 1 }}>
                <div style={{
                  height: "100%", width: progress + "%",
                  background: "linear-gradient(90deg, #7aa2f7, #bb9af7)",
                  borderRadius: 1, transition: "width 0.4s ease",
                }} />
              </div>
            </div>
          )}

          {error && (
            <div style={{
              padding: "10px 20px",
              background: "rgba(247, 118, 142, 0.06)",
              borderTop: "1px solid rgba(247, 118, 142, 0.2)",
              color: "#f7768e", fontSize: "12px",
            }}>
              {"\u2717"} {error}
            </div>
          )}
        </div>

        {/* Stats */}
        {stats && (
          <div className="fade-in" style={{
            display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))",
            gap: 10, marginBottom: 20,
          }}>
            {[
              { label: "Total Elems", value: stats.total.toLocaleString(), color: "#7aa2f7" },
              { label: "Announcements", value: stats.announces.toLocaleString(), color: "#73da94" },
              { label: "Withdrawals", value: stats.withdraws.toLocaleString(), color: "#f7768e" },
              { label: "Peer ASNs", value: stats.peerAsns.toLocaleString(), color: "#e0af68" },
              { label: "Unique Prefixes", value: stats.prefixes.toLocaleString(), color: "#bb9af7" },
            ].map(s => (
              <div key={s.label} style={{ border: "1px solid #1a2030", borderRadius: 4, padding: "12px 16px", background: "#0d1117" }}>
                <div style={{ color: "#506073", fontSize: "10px", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 6 }}>{s.label}</div>
                <div style={{ color: s.color, fontSize: "22px", fontWeight: 700, letterSpacing: "-0.02em" }}>{s.value}</div>
              </div>
            ))}
          </div>
        )}

        {/* Table */}
        {elems.length > 0 && (
          <div className="fade-in" style={{ border: "1px solid #1a2030", borderRadius: 4, overflow: "hidden" }}>
            <div style={{
              display: "flex", gap: 8, padding: "10px 14px",
              borderBottom: "1px solid #1a2030", alignItems: "center", flexWrap: "wrap", background: "#0d1117",
            }}>
              <span style={{ color: "#506073", fontSize: "11px", marginRight: 4 }}>
                {fileName && <span style={{ color: "#7aa2f7" }}>{fileName}</span>}
                {" \u00b7 "}{filtered.length.toLocaleString()} rows
              </span>

              <div style={{ display: "flex", gap: 4, marginLeft: "auto" }}>
                {["ALL", "ANNOUNCE", "WITHDRAW"].map(t => (
                  <button key={t} className="btn"
                    onClick={() => { setTypeFilter(t); setPage(0); }}
                    style={{
                      borderColor: typeFilter === t ? (t === "ANNOUNCE" ? "#73da94" : t === "WITHDRAW" ? "#f7768e" : "#7aa2f7") : "#2a3042",
                      color: typeFilter === t ? (t === "ANNOUNCE" ? "#73da94" : t === "WITHDRAW" ? "#f7768e" : "#7aa2f7") : "#506073",
                      padding: "4px 10px", fontSize: "11px",
                    }}
                  >{t}</button>
                ))}
              </div>

              <input type="text" value={search}
                onChange={(e) => { setSearch(e.target.value); setPage(0); }}
                placeholder="filter prefix / ASN / AS-path\u2026"
                style={{ width: 240 }}
              />
            </div>

            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", tableLayout: "auto" }}>
                <thead>
                  <tr style={{ borderBottom: "1px solid #1a2030" }}>
                    {[
                      { key: "timestamp", label: "Timestamp" },
                      { key: "type", label: "Type" },
                      { key: "prefix", label: "Prefix" },
                      { key: "peer_asn", label: "Peer ASN" },
                      { key: "peer_ip", label: "Peer IP" },
                      { key: "as_path", label: "AS Path" },
                      { key: "next_hop", label: "Next Hop" },
                      { key: "communities", label: "Communities" },
                    ].map(col => (
                      <th key={col.key} style={{ padding: "8px 12px", textAlign: "left", background: "#0d1117", whiteSpace: "nowrap" }}>
                        <button className={"th-btn" + (sortCol === col.key ? " active" : "")} onClick={() => toggleSort(col.key)}>
                          {col.label}
                          {sortCol === col.key && <span>{sortDir === "asc" ? " \u2191" : " \u2193"}</span>}
                        </button>
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {pageData.map((e, i) => {
                    const type = e.type || (e.elem_type === "W" ? "WITHDRAW" : "ANNOUNCE");
                    const isAnn = type === "ANNOUNCE";
                    const asPath = formatAsPath(e.as_path);
                    const communities = formatCommunities(e.communities);

                    return (
                      <tr key={i} className={isAnn ? "tr-announce" : "tr-withdraw"}
                        style={{ borderBottom: "1px solid #0f1621", background: i % 2 === 0 ? "#0a0e14" : "#0c111a", transition: "background 0.1s" }}>
                        <td style={{ padding: "6px 12px", color: "#506073", whiteSpace: "nowrap", fontSize: "12px" }}>{fmtTs(e.timestamp)}</td>
                        <td style={{ padding: "6px 12px", whiteSpace: "nowrap" }}>
                          <span style={{
                            fontSize: "10px", fontWeight: 700, letterSpacing: "0.06em", padding: "2px 6px", borderRadius: "2px",
                            background: isAnn ? "rgba(115, 218, 148, 0.12)" : "rgba(247, 118, 142, 0.12)",
                            color: isAnn ? "#73da94" : "#f7768e",
                            border: "1px solid " + (isAnn ? "rgba(115,218,148,0.25)" : "rgba(247,118,142,0.25)"),
                          }}>{isAnn ? "ANN" : "WDR"}</span>
                        </td>
                        <td style={{ padding: "6px 12px", color: "#9ab5ff", whiteSpace: "nowrap", fontWeight: 500 }}>{e.prefix || "\u2014"}</td>
                        <td style={{ padding: "6px 12px", color: "#e0af68", whiteSpace: "nowrap" }}>{e.peer_asn ? "AS" + e.peer_asn : "\u2014"}</td>
                        <td style={{ padding: "6px 12px", color: "#506073", whiteSpace: "nowrap", fontSize: "12px" }}>{e.peer_ip || "\u2014"}</td>
                        <td style={{ padding: "6px 12px", color: "#c5cdd9", maxWidth: 280 }}>
                          <span title={asPath || ""} style={{ display: "block", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                            {asPath ? truncate(asPath, 50) : <span style={{ color: "#2a3042" }}>{"\u2014"}</span>}
                          </span>
                        </td>
                        <td style={{ padding: "6px 12px", color: "#506073", whiteSpace: "nowrap", fontSize: "12px" }}>
                          {e.next_hop || <span style={{ color: "#2a3042" }}>{"\u2014"}</span>}
                        </td>
                        <td style={{ padding: "6px 12px", color: "#bb9af7", maxWidth: 200, fontSize: "11px" }}>
                          <span title={communities || ""} style={{ display: "block", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                            {communities || <span style={{ color: "#2a3042" }}>{"\u2014"}</span>}
                          </span>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            {/* Pagination */}
            {totalPages > 1 && (
              <div style={{
                display: "flex", alignItems: "center", justifyContent: "space-between",
                padding: "8px 14px", borderTop: "1px solid #1a2030", background: "#0d1117",
              }}>
                <span style={{ color: "#506073", fontSize: "11px" }}>
                  {page * PAGE_SIZE + 1}{"\u2013"}{Math.min((page + 1) * PAGE_SIZE, filtered.length)} of {filtered.length.toLocaleString()}
                </span>
                <div style={{ display: "flex", gap: 4 }}>
                  <button className="btn" disabled={page === 0} onClick={() => setPage(0)} style={{ padding: "3px 8px", fontSize: "11px" }}>{"\u00ab"}</button>
                  <button className="btn" disabled={page === 0} onClick={() => setPage(p => p - 1)} style={{ padding: "3px 8px", fontSize: "11px" }}>{"\u2039"}</button>
                  <span style={{ color: "#7aa2f7", fontSize: "11px", padding: "3px 10px", border: "1px solid #2a3042", borderRadius: 2 }}>
                    {page + 1} / {totalPages}
                  </span>
                  <button className="btn" disabled={page >= totalPages - 1} onClick={() => setPage(p => p + 1)} style={{ padding: "3px 8px", fontSize: "11px" }}>{"\u203a"}</button>
                  <button className="btn" disabled={page >= totalPages - 1} onClick={() => setPage(totalPages - 1)} style={{ padding: "3px 8px", fontSize: "11px" }}>{"\u00bb"}</button>
                </div>
              </div>
            )}
          </div>
        )}

        {/* Empty state */}
        {!isLoading && elems.length === 0 && !error && (
          <div style={{ textAlign: "center", padding: "60px 20px", color: "#2a3042" }}>
            <div style={{ fontSize: "32px", marginBottom: 12 }}>{"\u27c1"}</div>
            <div style={{ fontSize: "13px", letterSpacing: "0.04em" }}>
              {wasmStatus === "ready" ? "select a preset or enter an MRT URL above"
                : wasmStatus === "loading" ? "loading wasm module\u2026"
                : "wasm failed to load \u2014 check console"}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MrtExplorer />);
</script>
</body>
</html>
